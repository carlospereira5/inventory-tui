{{ define "session" }}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Session.Name }} — Inventario</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  <style>
    * { -webkit-font-smoothing: antialiased; }
    .htmx-request .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .flash { animation: flashIn 0.5s ease-out; }
    @keyframes flashIn {
      0%   { background-color: #f3f4f6; }
      100% { background-color: transparent; }
    }
    .htmx-swapping { opacity: 0; transition: opacity 100ms ease-out; }
  </style>
</head>
<body class="min-h-screen bg-white flex flex-col">

  <!-- NAV -->
  <nav class="bg-black shrink-0">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/"
           class="text-gray-400 hover:text-white text-sm transition-colors flex items-center gap-1">
          ← Sesiones
        </a>
        <span class="text-gray-700">|</span>
        <span class="text-white font-bold">{{ .Session.Name }}</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="refresh-indicator" class="htmx-indicator text-xs text-gray-400 flex items-center gap-1.5">
          <svg class="spin w-3 h-3" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          actualizando
        </span>
        <a href="/api/sessions/{{ .SessionID }}/export"
           hx-boost="false"
           class="flex items-center gap-1.5 px-3 py-1.5 border border-gray-600 text-gray-300 hover:border-white hover:text-white text-xs font-medium transition-colors">
          ↓ CSV
        </a>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="flex-1 max-w-7xl mx-auto w-full px-6 py-8 grid grid-cols-5 gap-8 items-start">

    <!-- ESCANEO -->
    <aside class="col-span-2 flex flex-col gap-4">

      <div class="border border-black p-6">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Escanear producto</p>
        <form
          hx-post="/api/sessions/{{ .SessionID }}/scan"
          hx-target="#scan-result"
          hx-swap="innerHTML"
          hx-indicator="#refresh-indicator"
          hx-on::after-request="this.reset(); this.querySelector('input').focus()"
          class="flex flex-col gap-3">
          <input
            type="text"
            name="barcode"
            autofocus
            autocomplete="off"
            placeholder="Código de barras..."
            class="w-full px-4 py-3 border-2 border-gray-200 focus:border-black bg-white text-sm outline-none transition-colors font-mono"/>
          <button type="submit"
            class="w-full py-2.5 bg-black text-white text-sm font-bold hover:bg-gray-800 active:scale-95 transition-all">
            Registrar
          </button>
        </form>
      </div>

      <div id="scan-result">
        <div class="flex flex-col items-center justify-center py-12 text-gray-300">
          <p class="text-sm">Esperando escaneo...</p>
        </div>
      </div>

    </aside>

    <!-- HISTORIAL — hx-ext="sse" mantiene la conexión SSE viva incluso cuando records se swapea -->
    <section class="col-span-3" hx-ext="sse" sse-connect="/events">
      <div class="flex items-center justify-between mb-4">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Historial</p>
        <span class="text-xs text-gray-300 flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 bg-gray-300 animate-pulse"></span>
          auto 5s
        </span>
      </div>

      {{ template "partials/records" . }}

    </section>
  </div>

</body>
</html>
{{ end }}
